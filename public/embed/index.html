<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex">
<title>BMI Calculator Widget</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:#fff;color:#1F2937;max-width:380px;margin:0 auto}
.widget{border:1px solid #E5E7EB;border-radius:12px;overflow:hidden}
.widget-header{background:linear-gradient(135deg,#10b981,#059669);color:#fff;padding:16px 20px;text-align:center}
.widget-header h2{font-size:16px;font-weight:700;margin:0}
.widget-header p{font-size:12px;opacity:.85;margin-top:4px}
.widget-body{padding:20px}
label{display:block;font-size:13px;font-weight:600;margin-bottom:4px;color:#374151}
.input-wrap{position:relative;margin-bottom:16px}
.input-wrap input{width:100%;padding:10px 40px 10px 14px;border:1px solid #D1D5DB;border-radius:8px;font-size:16px;outline:none;transition:border-color .2s}
.input-wrap input:focus{border-color:#10b981;box-shadow:0 0 0 3px rgba(16,185,129,.15)}
.input-wrap .suffix{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:#6B7280;font-size:14px;font-weight:500}
.result-card{background:#F9FAFB;border:1px solid #E5E7EB;border-radius:10px;padding:16px;margin-bottom:12px}
.result-main{text-align:center;margin-bottom:12px}
.result-main .label{font-size:12px;color:#6B7280;text-transform:uppercase;letter-spacing:.5px}
.result-main .amount{font-size:32px;font-weight:800;margin-top:2px}
.result-main .category{font-size:14px;font-weight:600;margin-top:4px}
.result-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.result-item{text-align:center;padding:8px;background:#fff;border-radius:6px;border:1px solid #F3F4F6}
.result-item .label{font-size:10px;color:#6B7280;text-transform:uppercase;letter-spacing:.3px}
.result-item .value{font-size:14px;font-weight:700;color:#1F2937;margin-top:2px}
.widget-footer{text-align:center;padding:12px 20px;border-top:1px solid #E5E7EB;background:#F9FAFB}
.widget-footer a{color:#10b981;text-decoration:none;font-size:12px;font-weight:600}
.widget-footer a:hover{text-decoration:underline}
.bmi-underweight{color:#3B82F6}
.bmi-normal{color:#10B981}
.bmi-overweight{color:#F59E0B}
.bmi-obese{color:#EF4444}
</style>
</head>
<body>
<div class="widget">
  <div class="widget-header">
    <h2>BMI Calculator</h2>
    <p>Calculate your Body Mass Index</p>
  </div>
  <div class="widget-body">
    <label for="weight">Weight</label>
    <div class="input-wrap">
      <input type="text" inputmode="decimal" id="weight" value="70" aria-label="Weight in kilograms">
      <span class="suffix">kg</span>
    </div>

    <label for="height">Height</label>
    <div class="input-wrap">
      <input type="text" inputmode="decimal" id="height" value="170" aria-label="Height in centimeters">
      <span class="suffix">cm</span>
    </div>

    <div class="result-card">
      <div class="result-main">
        <div class="label">Your BMI</div>
        <div class="amount" id="bmi-value">0</div>
        <div class="category" id="bmi-category">-</div>
      </div>
      <div class="result-grid">
        <div class="result-item">
          <div class="label">Healthy range</div>
          <div class="value" id="healthy-range">-</div>
        </div>
        <div class="result-item">
          <div class="label">Ideal weight</div>
          <div class="value" id="ideal-weight">-</div>
        </div>
      </div>
    </div>
  </div>
  <div class="widget-footer">
    Powered by <a href="https://bmi-imc.com/" target="_blank" rel="noopener">bmi-imc.com</a>
  </div>
</div>

<script>
(function(){
  function calc(){
    var w=parseFloat(document.getElementById('weight').value)||0;
    var h=parseFloat(document.getElementById('height').value)||0;
    if(w<=0||h<=0){return}
    var hm=h/100;
    var bmi=w/(hm*hm);
    var bmiEl=document.getElementById('bmi-value');
    var catEl=document.getElementById('bmi-category');
    bmiEl.textContent=bmi.toFixed(1);
    var cat,cls;
    if(bmi<18.5){cat='Underweight';cls='bmi-underweight'}
    else if(bmi<25){cat='Normal weight';cls='bmi-normal'}
    else if(bmi<30){cat='Overweight';cls='bmi-overweight'}
    else{cat='Obese';cls='bmi-obese'}
    bmiEl.className='amount '+cls;
    catEl.textContent=cat;
    catEl.className='category '+cls;
    var minW=(18.5*hm*hm).toFixed(1);
    var maxW=(24.9*hm*hm).toFixed(1);
    document.getElementById('healthy-range').textContent=minW+' - '+maxW+' kg';
    var ideal=(22*hm*hm).toFixed(1);
    document.getElementById('ideal-weight').textContent=ideal+' kg';
  }
  document.getElementById('weight').addEventListener('input',calc);
  document.getElementById('height').addEventListener('input',calc);
  calc();
})();
</script>
</body>
</html>
