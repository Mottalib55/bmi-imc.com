name: Build & Deploy to OVH via FTP

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-ovh
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build Vite
        run: npm run build

      - name: Inject SEO meta tags into static HTML
        run: node scripts/inject-seo.mjs

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp.cluster129.hosting.ovh.net
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: /www/

      - name: Post-deploy verification
        run: |
          sleep 10
          for url in \
            "https://bmi-imc.com/" \
            "https://bmi-imc.com/sitemap.xml" \
            "https://bmi-imc.com/robots.txt"; do
            status=$(curl -s -o /dev/null -w "%{http_code}" "$url")
            echo "$url → $status"
            if [ "$status" -ne 200 ]; then
              echo "::error::$url returned $status"
              exit 1
            fi
          done
          echo "All post-deploy checks passed"
